name: Auto YouTube Shorts Downloader

on:
  workflow_dispatch: # تشغيل يدوي
  schedule:
    - cron: '0 */6 * * *' # فحص تلقائي كل 6 ساعات (يمكنك تغييره)

jobs:
  download_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install FFmpeg
        # تثبيت مباشر لـ FFmpeg لدمج الصوت والصورة
        run: sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install yt-dlp requests

      - name: Create Cookies File
        # تأكد من إضافة الكوكيز في Secrets باسم YT_COOKIES
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Run Downloader Script
        # تشغيل ملف البايثون الذي أعددناه
        run: python main.py

      - name: Cleanup Sensitive Data
        if: always()
        run: rm -f cookies.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة المجلد وملف التتبع (JSON)
          git add shorts/ last_processed_ids.json
          
          # التحقق إذا كانت هناك ملفات جديدة فعلاً قبل الـ commit
          if git diff --staged --quiet; then
            echo "No new videos or changes to commit."
          else
            git commit -m "Download new shorts and update tracking index"
            git push
          fi
