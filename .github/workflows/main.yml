name: Auto YouTube Shorts & RSS Sync

on:
  workflow_dispatch: # للتشغيل اليدوي من تبويب Actions
  schedule:
    - cron: '0 */6 * * *' # تشغيل تلقائي كل 6 ساعات لفحص الجديد

jobs:
  sync_process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install yt-dlp requests

      - name: Create Cookies File
        # تأكد من إضافة الكوكيز في Secrets المستودع باسم YT_COOKIES
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Run Main Script
        # سيقوم بمعالجة 3 مقاطع وتحديث rss.xml و last_processed_id.json
        run: python main.py

      - name: Cleanup Sensitive Data
        if: always()
        run: rm -f cookies.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة المجلد، ملف التتبع، وملف الـ RSS الجديد
          git add shorts/ last_processed_id.json rss.xml
          
          # التحقق من وجود تغييرات قبل الإرسال
          if git diff --staged --quiet; then
            echo "لا توجد تحديثات جديدة حالياً."
          else
            git commit -m "Sync: 3 new shorts, update RSS and tracking ID"
            git push
          fi
