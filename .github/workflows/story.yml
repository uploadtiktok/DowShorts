name: Daily Story Publisher

on:
  schedule:
    - cron: '0 10 * * *'   # كل يوم 10:00 UTC
  workflow_dispatch:

jobs:
  publish-story:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client telethon python-dotenv
        pip install --upgrade --force-reinstall yt-dlp

    - name: Setup ffmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        yt-dlp --version

    - name: Run story script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
      run: |
        cd story
        python main.py

    - name: Commit and push last_story.txt
      if: success()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        cd story
        if [ -f "last_story.txt" ] && git diff --quiet last_story.txt; then
          echo "لا توجد تغييرات في last_story.txt"
        else
          git add last_story.txt
          git commit -m "chore: update last_story.txt [skip ci]" || true
          git push origin HEAD:${{ github.ref_name }}
        fi
