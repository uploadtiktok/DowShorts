name: Daily Story Publisher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * *'

jobs:
  publish-story:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          node --version

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp google-api-python-client telethon python-dotenv requests

      - name: Setup cookies file
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          if [ -f "cookies.txt" ]; then
            echo "✅ cookies.txt ready"
          else
            echo "⚠️ Warning: cookies.txt not created"
          fi

      - name: Run story script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd story
          python main.py
          cd ..

      - name: Cleanup cookies
        run: |
          rm -f cookies.txt

      - name: Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -f "story/last_story.txt" ]; then
            git add story/last_story.txt
          fi
          
          git add story/shorts/ 2>/dev/null || true
          
          git diff --staged --quiet || (git commit -m "chore: update story data [skip ci]" && git push)
