# .github/workflows/story.yml
name: Daily Story Publisher

on:
  schedule:
    # تشغيل السكربت كل يوم في الساعة 10:00 صباحاً بالتوقيت العالمي (UTC)
    # يمكنك تعديل هذه القيمة إلى أي وقت تريده
    - cron: '0 10 * * *'
  workflow_dispatch: # يتيح لك تشغيل السكربت يدوياً من خلال علامة تبويب Actions

jobs:
  publish-story:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        # مهم جداً: استخدام token شخصي لدفع التغييرات (مثل تحديث last_story.txt)
        # يُنصح بإنشاء Personal Access Token (PAT) وإضافته كـ secret باسم GH_PAT
        token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client telethon python-dotenv yt-dlp

    - name: Setup yt-dlp and ffmpeg
      run: |
        # تثبيت ffmpeg لدمج الصوت والصورة
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        # تثبيت أحدث إصدار من yt-dlp
        pip install --upgrade yt-dlp

    - name: Run story script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        API_ID: ${{ secrets.API_ID }}
        API_HASH: ${{ secrets.API_HASH }}
        SESSION_STRING: ${{ secrets.SESSION_STRING }}
      run: |
        cd story
        python main.py

    - name: Commit and push updated last_story.txt
      if: success()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add story/last_story.txt
        git diff --quiet && git diff --staged --quiet || git commit -m "chore: update last_story.txt [skip ci]"
        git push
