name: Auto Shorts & RSS Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Tools
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp requests

      - name: Cookies
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Run
        run: python main.py

      - name: Cleanup
        if: always()
        run: rm -f cookies.txt

      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # التأكد من وجود المجلد والملفات لتجنب الخطأ 128
          mkdir -p shorts
          git add shorts/
          
          [ -f "last_processed_id.json" ] && git add last_processed_id.json
          [ -f "rss.xml" ] && git add rss.xml
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Sync: 3 shorts & RSS update"
            git push
          fi
