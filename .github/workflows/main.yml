name: Auto Shorts & RSS Sync

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Tools
        run: |
          sudo apt-get install -y ffmpeg
          pip install yt-dlp requests

      - name: Run Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          python main.py
          rm -f cookies.txt

      - name: Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p shorts
          git add shorts/
          [ -f "last_processed_id.json" ] && git add last_processed_id.json
          [ -f "rss.xml" ] && git add rss.xml
          git diff --staged --quiet || (git commit -m "Sync & Cleanup" && git push)
