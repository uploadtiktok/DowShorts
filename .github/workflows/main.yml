name: Ultimate YouTube Downloader

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Update yt-dlp to Latest
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade yt-dlp

      - name: Create Cookies File
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Execute Download
        run: python download_short.py

      - name: Clean up Cookies
        if: always()
        run: rm -f cookies.txt

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -d "shorts" ] && [ "$(ls -A shorts)" ]; then
            git add shorts/
            git commit -m "Video downloaded successfully"
            git push
          fi
