name: Auto YouTube Shorts Sync

on:
  workflow_dispatch: # تشغيل يدوي من تبويب Actions
  schedule:
    - cron: '0 */6 * * *' # تشغيل تلقائي كل 6 ساعات لفحص المقاطع الجديدة

jobs:
  sync_shorts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # جلب أحدث نسخة فقط لتوفير الوقت

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install FFmpeg
        # ضروري لدمج جودة 1080p (فيديو + صوت)
        run: sudo apt-get install -y ffmpeg

      - name: Install Python Dependencies
        run: |
          pip install yt-dlp requests

      - name: Create Cookies File
        # تأكد من وضع الكوكيز في إعدادات المستودع (Settings > Secrets) باسم YT_COOKIES
        run: echo "${{ secrets.YT_COOKIES }}" > cookies.txt

      - name: Run Sync Script
        # سيقوم السكريبت بفحص RSS وتحميل الجديد فقط وتحديث last_processed_id.json
        run: python main.py

      - name: Cleanup Sensitive Data
        if: always()
        run: rm -f cookies.txt

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # إضافة المجلد وملف التتبع الفردي (آخر ID فقط)
          git add shorts/ last_processed_id.json
          
          # التحقق من وجود تغييرات (فيديوهات جديدة أو تحديث الـ ID)
          if git diff --staged --quiet; then
            echo "لا توجد فيديوهات جديدة أو تغييرات للمزامنة حالياً."
          else
            git commit -m "Sync new shorts and update latest processed ID"
            git push
          fi
